<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RobiBet - Spin & Win</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Montserrat", sans-serif;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #0a1628;
        overflow-x: hidden;
      }

      /* ── BACKGROUND ── */
      .bg {
        position: fixed;
        inset: 0;
        background-image: url("gallery.jpg");
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        filter: blur(2px);
        z-index: 0;
      }
      .bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(5, 15, 35, 0.45) 0%,
          rgba(5, 15, 35, 0.25) 40%,
          rgba(5, 15, 35, 0.55) 80%,
          rgba(5, 15, 35, 0.85) 100%
        );
      }

      .content-wrapper {
        position: relative;
        width: 500px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .content-bg {
        position: absolute;
        inset: 0;
        background-image: url("bg.jpg");
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        z-index: 0;
      }
      .content-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(5, 15, 35, 0.45) 0%,
          rgba(5, 15, 35, 0.25) 40%,
          rgba(5, 15, 35, 0.55) 80%,
          rgba(5, 15, 35, 0.85) 100%
        );
      }

      /* ── LOGO ── */
      .logo {
        user-select: none;
        width: clamp(180px, 55vw, 350px);
        height: auto;
        max-height: 160px;
        object-fit: contain;
        z-index: 100;
      }

      /* ── COINS (fixed, scattered around viewport) ── */
      .coin {
        position: fixed;
        object-fit: contain;
        z-index: 50;
        pointer-events: none;
        animation: coinFloat var(--dur, 4s) ease-in-out infinite alternate;
      }
      @keyframes coinFloat {
        0% {
          transform: translateY(0px) rotate(-5deg) scale(1);
        }
        100% {
          transform: translateY(-16px) rotate(5deg) scale(1.04);
        }
      }

      /* single coin instances */
      .cs1 {
        width: clamp(44px, 7vw, 82px);
        top: 5%;
        left: 1%;
        --dur: 3.8s;
        animation-delay: 0s;
      }
      .cs2 {
        width: clamp(36px, 5.5vw, 66px);
        top: 22%;
        right: 2%;
        --dur: 4.5s;
        animation-delay: 0.7s;
      }
      .cs3 {
        width: clamp(40px, 6vw, 72px);
        top: 58%;
        left: 2%;
        --dur: 3.3s;
        animation-delay: 1.1s;
      }
      .cs4 {
        width: clamp(32px, 4.5vw, 56px);
        bottom: 18%;
        right: 4%;
        --dur: 5.1s;
        animation-delay: 0.4s;
      }
      .cs5 {
        width: clamp(28px, 4vw, 50px);
        bottom: 8%;
        left: 14%;
        --dur: 4.2s;
        animation-delay: 1.6s;
      }
      .cs6 {
        width: clamp(34px, 5vw, 60px);
        top: 40%;
        right: 1%;
        --dur: 3.6s;
        animation-delay: 0.2s;
      }

      /* multiple/stack coin instances */
      .cm1 {
        width: clamp(62px, 11vw, 120px);
        top: 3%;
        right: 6%;
        --dur: 4.7s;
        animation-delay: 0.5s;
      }
      .cm2 {
        width: clamp(55px, 9vw, 105px);
        bottom: 22%;
        right: 1%;
        --dur: 3.4s;
        animation-delay: 1s;
      }
      .cm3 {
        width: clamp(60px, 10vw, 115px);
        top: 48%;
        left: 0%;
        --dur: 4.9s;
        animation-delay: 1.4s;
      }
      .cm4 {
        width: clamp(50px, 8vw, 95px);
        bottom: 4%;
        left: 5%;
        --dur: 3.9s;
        animation-delay: 0.8s;
      }
      .cm5 {
        width: clamp(44px, 7vw, 85px);
        top: 72%;
        right: 7%;
        --dur: 4.3s;
        animation-delay: 0.3s;
      }

      /* hide some on small screens to prevent clutter */
      @media (max-width: 420px) {
        .cs3,
        .cs5,
        .cs6,
        .cm3,
        .cm5 {
          display: none;
        }
      }
      @media (max-height: 680px) {
        .cm3,
        .cs3 {
          display: none;
        }
      }

      /* ── WHEEL SECTION ── */
      .wheel-section {
        position: relative;
        z-index: 10;
        margin-top: clamp(12px, 3.5vw, 36px);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Pointer */
      .pointer {
        width: 0;
        height: 0;
        border-left: 18px solid transparent;
        border-right: 18px solid transparent;
        border-top: 38px solid #f5a623;
        filter: drop-shadow(0 2px 8px rgba(245, 166, 35, 0.8));
        margin-bottom: -6px;
        z-index: 20;
        position: relative;
      }
      .pointer::after {
        content: "";
        position: absolute;
        top: -38px;
        left: -12px;
        width: 0;
        height: 0;
        border-left: 12px solid transparent;
        border-right: 12px solid transparent;
        border-top: 26px solid #ffd966;
      }

      /* Wheel wrapper */
      .wheel-wrapper {
        position: relative;
        width: clamp(250px, 74vw, 310px);
        height: clamp(250px, 74vw, 310px);
      }

      canvas#wheel {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        display: block;
        box-shadow:
          0 0 0 clamp(3px, 1vw, 6px) #8b1a1a,
          0 0 0 clamp(7px, 2.2vw, 12px) #c8a227,
          0 0 0 clamp(10px, 3vw, 16px) #8b1a1a,
          0 0 40px rgba(200, 162, 39, 0.6),
          0 0 80px rgba(200, 162, 39, 0.3);
        cursor: pointer;
      }

      /* Center spin button */
      .center-spin-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: clamp(58px, 17vw, 80px);
        height: clamp(58px, 17vw, 80px);
        border-radius: 50%;
        background: radial-gradient(
          circle at 38% 32%,
          #a8e063,
          #56ab2f 50%,
          #2d6e10 100%
        );
        box-shadow:
          0 0 0 4px #8b1a1a,
          0 0 0 8px #c8a227,
          0 0 0 11px #8b1a1a,
          0 6px 20px rgba(0, 0, 0, 0.6),
          0 0 24px rgba(86, 171, 47, 0.6);
        z-index: 20;
        cursor: pointer;
        border: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1px;
        transition:
          transform 0.15s,
          box-shadow 0.15s;
      }
      .center-spin-btn:hover:not(:disabled) {
        transform: translate(-50%, -50%) scale(1.08);
        box-shadow:
          0 0 0 4px #8b1a1a,
          0 0 0 8px #c8a227,
          0 0 0 11px #8b1a1a,
          0 8px 28px rgba(0, 0, 0, 0.7),
          0 0 36px rgba(86, 171, 47, 0.8);
      }
      .center-spin-btn:active:not(:disabled) {
        transform: translate(-50%, -50%) scale(0.95);
      }
      .center-spin-btn:disabled {
        opacity: 0.95;
        cursor: not-allowed;
        transform: translate(-50%, -50%);
      }
      .center-spin-btn .btn-label {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(10px, 3.2vw, 13px);
        letter-spacing: 1.5px;
        color: #fff;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        line-height: 1;
      }

      /* ── RESULT PANEL ── */
      .result-panel {
        position: relative;
        z-index: 10;
        margin-top: clamp(14px, 4vw, 24px);
        width: clamp(270px, 88vw, 340px);
        text-align: center;
        min-height: 110px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .result-text {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(24px, 7vw, 36px);
        letter-spacing: 2px;
        color: #fff;
        text-shadow: 0 2px 12px rgba(245, 166, 35, 0.8);
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 0.5s ease,
          transform 0.5s ease;
        line-height: 1.1;
      }
      .result-text.show {
        opacity: 1;
        transform: translateY(0);
      }
      .result-text .amount {
        display: block;
        font-size: clamp(34px, 10vw, 52px);
        color: #ffd700;
        text-shadow:
          0 0 20px rgba(255, 215, 0, 0.8),
          0 2px 6px rgba(0, 0, 0, 0.5);
      }
      .result-text .label {
        font-size: clamp(15px, 4.5vw, 22px);
        color: #ccc;
      }

      .claim-btn {
        padding: clamp(12px, 3.5vw, 16px) clamp(32px, 9vw, 60px);
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(18px, 5.5vw, 28px);
        letter-spacing: 3px;
        color: #fff;
        background: linear-gradient(
          180deg,
          #f5a623 0%,
          #d4820a 50%,
          #a05e05 100%
        );
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow:
          0 5px 0 #7a3e02,
          0 8px 20px rgba(212, 130, 10, 0.5),
          inset 0 2px 6px rgba(255, 255, 255, 0.3);
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        opacity: 0;
        transform: translateY(20px) scale(0.9);
        transition:
          opacity 0.5s ease 0.2s,
          transform 0.5s ease 0.2s,
          box-shadow 0.12s;
        pointer-events: none;
        display: block;
      }
      .claim-btn.show {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: all;
      }
      .claim-btn:hover.show {
        background: linear-gradient(
          180deg,
          #ffbc45 0%,
          #e5920f 50%,
          #b8700a 100%
        );
        box-shadow:
          0 7px 0 #7a3e02,
          0 12px 28px rgba(212, 130, 10, 0.6),
          inset 0 2px 6px rgba(255, 255, 255, 0.35);
      }
      .claim-btn:active {
        transform: translateY(4px) scale(0.98);
        box-shadow:
          0 2px 0 #7a3e02,
          0 4px 12px rgba(212, 130, 10, 0.4);
      }

      a {
        text-decoration: none;
      }

      /* Confetti burst */
      .confetti-container {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 100;
      }
      .confetti-piece {
        position: absolute;
        width: 10px;
        height: 10px;
        opacity: 0;
        animation: confettiFall 1.8s ease-out forwards;
      }
      @keyframes confettiFall {
        0% {
          opacity: 1;
          transform: translateY(0) rotate(0deg) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(400px) rotate(720deg) scale(0.3);
        }
      }
    </style>
  </head>
  <body>
    <!-- Background -->
    <div class="bg"></div>

    <!-- Single coins – scattered -->
    <img class="coin cs1" src="singe-coin.webp" alt="" />
    <img class="coin cs2" src="singe-coin.webp" alt="" />
    <img class="coin cs3" src="singe-coin.webp" alt="" />
    <img class="coin cs4" src="singe-coin.webp" alt="" />
    <img class="coin cs5" src="singe-coin.webp" alt="" />
    <img class="coin cs6" src="singe-coin.webp" alt="" />

    <!-- Multiple/stack coins – scattered -->
    <img class="coin cm1" src="mutiple-coin.webp" alt="" />
    <img class="coin cm2" src="mutiple-coin.webp" alt="" />
    <img class="coin cm3" src="mutiple-coin.webp" alt="" />
    <img class="coin cm4" src="mutiple-coin.webp" alt="" />
    <img class="coin cm5" src="mutiple-coin.webp" alt="" />

    <div class="content-wrapper">
      <div class="content-bg"></div>
      <!-- Logo -->
      <img class="logo" src="logo.png" alt="RobiBet" />

      <!-- Wheel -->
      <div class="wheel-section">
        <div class="pointer"></div>
        <div class="wheel-wrapper">
          <canvas id="wheel" width="620" height="620"></canvas>
          <button class="center-spin-btn" id="spinBtn" onclick="spinWheel()">
            <span class="btn-label">SPIN</span>
          </button>
        </div>
      </div>

      <!-- Result -->
      <div class="result-panel">
        <div class="result-text" id="resultText">
          <span class="label" id="resultLabel"></span>
          <span class="amount" id="resultAmount"></span>
        </div>
        <a href="https://robibet.com" target="_blank" rel="noopener noreferrer">
          <button class="claim-btn" id="claimBtn">🎉 CLAIM NOW</button>
        </a>
      </div>
      <!-- Confetti container -->
      <div class="confetti-container" id="confettiContainer"></div>
    </div>

    <script>
      const segments = [
        {
          label: "BONUS\n25,000 BDT",
          color: "#c8a227",
          prize: "BONUS 25,000 BDT",
          big: true,
        },
        { label: "TRY AGAIN", color: "#8b1a1a", prize: null },
        { label: "NO WINNING", color: "#c8a227", prize: null },
        { label: "250 FREE\nSPIN", color: "#8b1a1a", prize: "250 FREE SPINS" },
        {
          label: "BONUS\n25,000 BDT",
          color: "#c8a227",
          prize: "BONUS 25,000 BDT",
          big: true,
        },
        { label: "NO WINNING", color: "#8b1a1a", prize: null },
        { label: "50 FREE\nSPIN", color: "#c8a227", prize: "50 FREE SPINS" },
        { label: "TRY AGAIN", color: "#8b1a1a", prize: null },
        { label: "250 FREE\nSPIN", color: "#c8a227", prize: "250 FREE SPINS" },
        { label: "50 FREE\nSPIN", color: "#8b1a1a", prize: "50 FREE SPINS" },
      ];

      const canvas = document.getElementById("wheel");
      const ctx = canvas.getContext("2d");
      const N = segments.length;
      const ARC = (2 * Math.PI) / N;
      let currentAngle = 0;
      let isSpinning = false;

      // pick all elements
      const resultLabel = document.getElementById("resultLabel");
      const resultAmount = document.getElementById("resultAmount");
      const resultText = document.getElementById("resultText");
      const claimBtn = document.getElementById("claimBtn");
      const spinBtn = document.getElementById("spinBtn");
      const confettiContainer = document.getElementById("confettiContainer");

      function drawWheel(rot) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2,
          cy = canvas.height / 2,
          r = cx - 10;

        for (let i = 0; i < N; i++) {
          const sa = rot + i * ARC - Math.PI / 2;
          const ea = sa + ARC;

          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, r, sa, ea);
          ctx.closePath();
          ctx.fillStyle = segments[i].color;
          ctx.fill();

          ctx.strokeStyle = "rgba(255,255,255,0.15)";
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(sa + ARC / 2);
          ctx.textAlign = "right";
          ctx.fillStyle = "#fff";
          ctx.shadowColor = "rgba(0,0,0,0.6)";
          ctx.shadowBlur = 4;
          const lines = segments[i].label.split("\n");
          const fontSize = lines.some((l) => l.length > 9) ? 18 : 20;
          ctx.font = `900 ${fontSize}px Montserrat, sans-serif`;
          const textX = r - 18;
          if (lines.length === 2) {
            ctx.fillText(lines[0], textX, -10);
            ctx.fillText(lines[1], textX, 14);
          } else {
            ctx.fillText(lines[0], textX, 7);
          }
          ctx.restore();
        }

        for (let i = 0; i < N * 2; i++) {
          const a = rot + (i * Math.PI) / N - Math.PI / 2;
          const dx = cx + r * Math.cos(a);
          const dy = cy + r * Math.sin(a);
          ctx.beginPath();
          ctx.arc(dx, dy, 5, 0, Math.PI * 2);
          ctx.fillStyle = "#ffd700";
          ctx.fill();
        }
      }

      drawWheel(0);

      let spinCount = 0;

      function spinWheel() {
        if (isSpinning) return;

        if (spinCount > 3) {
          resultLabel.textContent =
            "😞 No Winning This Time. Try after some times";
        }
        isSpinning = true;
        spinCount++;

        spinBtn.disabled = true;
        resultText.classList.remove("show");
        claimBtn.classList.remove("show");

        const winIndex = Math.floor(Math.random() * N);
        const segCenter = (winIndex + 0.5) * ARC;
        const extraSpins = 5 + Math.floor(Math.random() * 3);
        const target = extraSpins * 2 * Math.PI + (2 * Math.PI - segCenter);
        const duration = 4000;
        const startTime = performance.now();
        const startAngle = currentAngle;

        function ease(t) {
          return 1 - Math.pow(1 - t, 4);
        }
        function animate(now) {
          const t = Math.min((now - startTime) / duration, 1);
          currentAngle = startAngle + target * ease(t);
          drawWheel(currentAngle);
          if (t < 1) {
            requestAnimationFrame(animate);
            return;
          }
          currentAngle = startAngle + target;
          drawWheel(currentAngle);
          isSpinning = false;
          showResult(winIndex);
        }
        requestAnimationFrame(animate);
      }

      function showResult(idx) {
        const seg = segments[idx];
        if (seg.prize) {
          resultLabel.textContent = "🎊 You Won!";
          resultAmount.textContent = seg.prize;
          resultText.classList.add("show");
          claimBtn.classList.add("show");
          launchConfetti();
        } else {
          document.getElementById("resultLabel").textContent =
            seg.label === "TRY AGAIN"
              ? "😔 Try Again!"
              : "😞 No Winning This Time";
          resultAmount.textContent = "";
          resultText.classList.add("show");
          spinBtn.disabled = false;
        }
      }

      function launchConfetti() {
        confettiContainer.innerHTML = "";
        const colors = [
          "#ffd700",
          "#f5a623",
          "#7ed321",
          "#ff4444",
          "#fff",
          "#c8a227",
        ];
        for (let i = 0; i < 60; i++) {
          const piece = document.createElement("div");
          piece.className = "confetti-piece";
          const color = colors[~~(Math.random() * colors.length)];
          const size = 6 + Math.random() * 10;
          piece.style.cssText = `
            left:${10 + Math.random() * 80}%;top:${20 + Math.random() * 30}%;
            width:${size}px;height:${size}px;background:${color};
            border-radius:${Math.random() > 0.5 ? "50%" : "2px"};
            animation-delay:${Math.random() * 0.6}s;
            animation-duration:${1.5 + Math.random()}s;
          `;
          confettiContainer.appendChild(piece);
        }
      }
    </script>
  </body>
</html>
